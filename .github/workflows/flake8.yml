name: Flake8

on: [push]

jobs:
  build:
    name: Linting and Static Code Analysis with flake8 plugins
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
    - name: Setting up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        check-latest: false
        update-environment: false
        allow-prereleases: false
    - name: Setting virtual environment for Python3 3.10
      run: |
        python -m venv .venv
        source .venv/bin/activate
    - name: Install flake8 and flake8 plugins
      run: |
        source .venv/bin/activate
        python -m pip install --upgrade pip
        pip install flake8 flake8-bandit flake8-docstrings==1.6.0 flake8-todos flake8-debugger flake8-eradicate
        pip install -r resources/requirements.txt
    - name: Install Windows-specific packages
      if: runner.os == 'Windows'
      run: |
        source .venv/bin/activate
        pip install json
    - name: Analysing the code with flake8 and flake8 plugins
      run: |
        source .venv/bin/activate
        flake8 .
